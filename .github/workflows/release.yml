name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Import signing certificate
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"

          printf '%s' "$CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k runner \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Run tests
        run: |
          xcodebuild test \
            -project TrackpadAir.xcodeproj \
            -scheme TrackpadAir \
            -destination 'platform=macOS'

      - name: Archive app
        run: |
          xcodebuild archive \
            -project TrackpadAir.xcodeproj \
            -scheme TrackpadAir \
            -archivePath "$RUNNER_TEMP/TrackpadAir.xcarchive"

      - name: Package app
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/TrackpadAir.xcarchive/Products/Applications/TrackpadAir.app" \
            TrackpadAir.app.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            TrackpadAir.app.zip \
            --generate-notes \
            --verify-tag

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
